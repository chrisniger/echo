services:
  cloud-api:
    build:
      context: .
      dockerfile: apps/cloud-api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - JWT_SECRET=${CLOUD_API_JWT_SECRET:-dev-secret-change-in-production}
      - JWT_EXPIRES_IN=${CLOUD_API_JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${CLOUD_API_JWT_REFRESH_EXPIRES_IN:-7d}
      - DB_PATH=/data/echo.db
      - CORS_ORIGIN=${CLOUD_API_CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - echo-data:/data
    depends_on:
      - minio

  ai-gateway:
    build:
      context: .
      dockerfile: apps/ai-gateway/Dockerfile
    ports:
      - '4001:4001'
    environment:
      - PORT=4001
      - CORS_ORIGIN=${AI_GATEWAY_CORS_ORIGIN:-http://localhost:5173}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-60}
      - RATE_LIMIT_TOKENS=${RATE_LIMIT_TOKENS:-100000}

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  echo-data:
  minio-data:
