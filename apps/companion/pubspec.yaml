name: echo_companion
description: Echo GPT Companion — mobile second-screen
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.2
  http: ^1.2.2
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  qr_code_scanner: ^1.0.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  provider: ^6.1.2
  intl: ^0.19.0
  firebase_messaging: ^15.2.4
  firebase_core: ^3.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
